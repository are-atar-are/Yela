name: Deploy iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods
        working-directory: ios
        run: |
          bundle install
          bundle exec pod install

      - name: Setup Fastlane
        working-directory: ios
        run: gem install fastlane

      - name: Generate Certificates and Build
        working-directory: ios
        env:
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          # Create keychain with absolute path
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "github-actions" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "github-actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -l "$KEYCHAIN_PATH"
          # Generate new certificate and profile (no Match!)
          fastlane cert --development false --username are.atar.are@gmail.com --keychain_path "$KEYCHAIN_PATH"
          fastlane sigh --app_identifier com.yela.app --username are.atar.are@gmail.com --output_path ~/Library/MobileDevice/Provisioning\ Profiles/
          # Build
          fastlane beta
