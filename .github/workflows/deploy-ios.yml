name: Deploy iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: Yela

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Yela/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          bundle exec pod install

      - name: Setup Signing
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          cd ios
          # Decode certificate
          echo "$IOS_CERTIFICATE_P12" | base64 -d > certificate.p12
          # Decode provisioning profile
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > profile.mobileprovision
          # Create keychain
          security create-keychain -p "github-actions" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "github-actions" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          # Import certificate
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          # List identities
          security find-identity -v -p codesigning build.keychain

      - name: Build and Deploy to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          cd ios
          # Build with xcodebuild directly
          xcodebuild -workspace Yela.xcworkspace -scheme Yela -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' -archivePath Yela.xcarchive archive CODE_SIGN_IDENTITY="Apple Distribution: Morokolo Matotoka (46Z55D38V7)" PROVISIONING_PROFILE_SPECIFIER="match AppStore com.yela.app" DEVELOPMENT_TEAM="46Z55D38V7"
          # Export IPA
          xcodebuild -exportArchive -archivePath Yela.xcarchive -exportOptionsPlist exportOptions.plist -exportPath ./build
          # Upload to TestFlight using API key
          xcrun altool --upload-app --type ios --file "./build/Yela.ipa" --apiKey "$APP_STORE_CONNECT_KEY_ID" --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
