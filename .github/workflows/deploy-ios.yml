name: Deploy iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: Yela

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Yela/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          bundle exec pod install

      - name: Setup Fastlane
        run: |
          cd ios
          gem install fastlane

      - name: Generate Certificates and Build
        env:
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          cd ios
          # Create keychain
          security create-keychain -p "github-actions" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "github-actions" build.keychain
          # Generate certificate and profile using API key
          fastlane cert --api_key_path fastlane/api_key.json --keychain_path build.keychain --keychain_password github-actions
          fastlane sigh --api_key_path fastlane/api_key.json --app_identifier com.yela.app --output_path ~/Library/MobileDevice/Provisioning\ Profiles/
          # Build
          fastlane beta
