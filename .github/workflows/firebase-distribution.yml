name: Build and Distribute to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profiles
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          BUILD_CERTIFICATE_BASE64=$(cat .github/secrets/BUILD_CERTIFICATE_BASE64.txt)
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          DEV_PROFILE_BASE64=$(cat .github/secrets/DEVELOPMENT_PROFILE_BASE64.txt)
          echo -n "$DEV_PROFILE_BASE64" | base64 --decode -o $RUNNER_TEMP/dev.mobileprovision
          DEV_UUID=$(security cms -D -i $RUNNER_TEMP/dev.mobileprovision 2>/dev/null | grep -A1 "<key>UUID</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '\n')
          cp $RUNNER_TEMP/dev.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$DEV_UUID.mobileprovision

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS Archive
        run: |
          cd ios
          xcodebuild -workspace Yela.xcworkspace \
          -scheme "Yela" \
          -sdk iphoneos \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath $RUNNER_TEMP/Yela.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="Yela CI Development profile" \
          archive

      - name: Export IPA
        run: |
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          cat > $EXPORT_OPTS_PATH << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yela.app</key>
                  <string>Yela CI Development profile</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/Yela.xcarchive -exportOptionsPlist $EXPORT_OPTS_PATH -exportPath ./artifacts

      - name: Upload IPA to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:846145100933:ios:545c7ffdd25a2ce5599dec
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: ./artifacts/Yela.ipa
          debug: true

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          echo "Cleaning up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af || true
          echo "Disk space cleaned."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Node 
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode and save keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/yela-upload.keystore

      - name: Clean Gradle Cache
        run: cd android && ./gradlew clean

      - name: Build Android App
        run: |
          cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: yela-upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Check APK Location
        run: |
          echo "Looking for APK file..."
          find android/app/build/outputs/apk -type f

      - name: Validate APK Exists
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [[ -f "$APK_PATH" ]]; then
            echo "✅ APK file exists at: $APK_PATH"
            ls -l "$APK_PATH"
          else
            echo "❌ APK file is missing!"
            exit 1
          fi

      - name: Upload APK to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:846145100933:android:300f2ba632a11884599dec
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: android/app/build/outputs/apk/release/app-release.apk
          debug: true
