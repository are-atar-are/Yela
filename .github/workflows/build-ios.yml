name: Build iOS app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_with_signing:
    runs-on: macos-latest
    steps:
      - name: check Xcode version
        run: /usr/bin/xcodebuild -version

      - name: checkout repository
        uses: actions/checkout@v4

      - name: Install the Apple certificate and provisioning profile
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/Yela.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Read base64 values from files
          BUILD_CERTIFICATE_BASE64=$(cat .github/secrets/BUILD_CERTIFICATE_BASE64.txt)
          PROVISION_PROFILES_BASE64=$(cat .github/secrets/PROVISION_PROFILES_BASE64.txt)

          # Debug: Check file lengths
          echo "Certificate base64 length: ${#BUILD_CERTIFICATE_BASE64}"
          echo "Profile base64 length: ${#PROVISION_PROFILES_BASE64}"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISION_PROFILES_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Install Development profile for archiving
          DEV_PROFILE_BASE64=$(cat .github/secrets/DEVELOPMENT_PROFILE_BASE64.txt)
          echo -n "$DEV_PROFILE_BASE64" | base64 --decode -o $RUNNER_TEMP/Yela_Development.mobileprovision
          DEV_UUID=$(security cms -D -i $RUNNER_TEMP/Yela_Development.mobileprovision 2>/dev/null | grep -A1 "<key>UUID</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '\n')
          cp $RUNNER_TEMP/Yela_Development.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$DEV_UUID.mobileprovision
          echo "Installed Development provisioning profile with UUID: $DEV_UUID"
          
          # Install App Store profile for exporting
          UUID=$(security cms -D -i $PP_PATH 2>/dev/null | grep -A1 "<key>UUID</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '\n')
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed App Store provisioning profile with UUID: $UUID"

          security find-identity -v -p codesigning
          ls -l ~/Library/MobileDevice/Provisioning\ Profiles     

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Cocoapods dependencies
        run: |
          cd ios
          pod install

      - name: build archive
        run: |
          cd ios
          xcodebuild -workspace Yela.xcworkspace \
          -scheme "Yela" \
          -sdk iphoneos \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath $RUNNER_TEMP/Yela.xcarchive \
          archive   

      - name: export ipa
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o $EXPORT_OPTS_PATH
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/Yela.xcarchive -exportOptionsPlist $EXPORT_OPTS_PATH -exportPath ./artifacts

      - name: Verify IPA file exists
        run: |
          ls -l ./artifacts/*.ipa

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Yela.ipa
          path: ./artifacts/*.ipa

  distribute:
    runs-on: macos-latest
    needs: [build_with_signing]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Yela.ipa
          path: ./artifacts

      - name: Verify IPA file exists
        run: |
          ls -l ./artifacts/*.ipa

      - name: Setup API Key for TestFlight
        run: |
          APP_STORE_API_KEY=$(cat .github/secrets/APP_STORE_API_KEY.txt)
          echo -n "$APP_STORE_API_KEY" | base64 --decode -o ./api_key.p8
          ls -l ./api_key.p8

      - name: Upload to TestFlight
        uses: appleboy/app-store-release-action@v1.5.0
        with:
          api_key_path: ./api_key.p8
          ipa_path: ./artifacts/Yela.ipa
          submit_for_review: false
          release_type: beta
